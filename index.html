<style>
  :root {
    /* clean white base */
    --bg: #ffffff;
    --bg-2: #f5f4f1;
    --fg: #111111;
    --fg-2: #454545;
    --fg-3: #8c8c8c;
    --line: #e2e0dc;
    --accent: oklch(0.7 0.19 45);         /* punchy CI orange */
    --accent-ink: #16140f;
    --scale: 1;
    --serif: "Kreol Standard", "Georgia", serif;
    --mono: "Neue Rational Mono", ui-monospace, "JetBrains Mono", monospace;
  }
  [data-theme="dark"] {
    --bg: #16140f;
    --bg-2: #23201a;
    --fg: #ece9e2;
    --fg-2: #b8b4a8;
    --fg-3: #73706a;
    --line: #332f28;
    --accent-ink: #16140f;
  }
  [data-accent="terracotta"] { --accent: oklch(0.7 0.19 45); }
  [data-accent="olive"]      { --accent: oklch(0.66 0.1 115); }
  [data-accent="rose"]       { --accent: oklch(0.72 0.14 15); }
  [data-accent="ink"]        { --accent: #16140f; --accent-ink: #ece9e2; }
  [data-accent="amber"]      { --accent: oklch(0.78 0.13 75); }

  [data-scale="small"]  { --scale: 0.88; }
  [data-scale="medium"] { --scale: 1; }
  [data-scale="large"]  { --scale: 1.12; }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--mono);
    font-size: calc(14px * var(--scale));
    line-height: 1.5;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    letter-spacing: 0;
    overflow-x: hidden;
    text-transform: lowercase;
  }
  .serif { font-family: var(--serif); text-transform: none; letter-spacing: 0; font-weight: 300; }
  em.word, .word-em { font-family: var(--serif); font-style: italic; text-transform: none; font-weight: 300 !important; }

  /* Headlines: Neue Rational Mono Bold, ALL CAPS — italic serif accents
     go caps too. Mono word gaps are huge, so tighten word-spacing. */
  h1, h2, h3, h4 { font-weight: 700 !important; font-family: var(--mono); text-transform: uppercase; word-spacing: -0.34ch; }
  h1 .word-em, h2 .word-em, h3 .word-em,
  h1 em.word, h2 em.word, h3 em.word { font-weight: 300 !important; text-transform: uppercase; word-spacing: 0; }
  #root { min-height: 100vh; }

  /* Selection */
  ::selection { background: var(--accent); color: var(--accent-ink); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 0; }
  ::-webkit-scrollbar-thumb:hover { background: var(--fg-3); }

  /* global tighter line-height for wrapped headlines */
  h1, h2, h3 { line-height: 1.05; }

  /* Striped placeholder */
  .placeholder {
    background:
      repeating-linear-gradient(
        135deg,
        var(--bg-2) 0,
        var(--bg-2) 8px,
        var(--bg) 8px,
        var(--bg) 16px
      );
    border: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--fg-3);
    font-size: calc(10px * var(--scale));
    text-transform: uppercase;
    letter-spacing: 0.08em;
    position: relative;
  }
  .placeholder::before, .placeholder::after {
    content: '';
    position: absolute;
    background: var(--fg-3);
    opacity: 0.35;
  }

  /* Buttons */
  button {
    font: inherit;
    color: inherit;
    background: none;
    border: none;
    cursor: pointer;
    text-transform: inherit;
    letter-spacing: inherit;
  }
  button:focus-visible, a:focus-visible {
    outline: 1px solid var(--accent);
    outline-offset: 2px;
  }
  a { color: inherit; text-decoration: none; }

  /* Pulsing ring */
  @keyframes pulse-ring {
    0%   { transform: scale(1); opacity: 0.7; }
    80%  { transform: scale(1.7); opacity: 0; }
    100% { transform: scale(1.7); opacity: 0; }
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.35); }
    50%      { box-shadow: 0 0 60px 10px rgba(255,255,255,0.15); }
  }
  @keyframes drift {
    0%   { transform: translate(0,0); }
    50%  { transform: translate(-2px, 3px); }
    100% { transform: translate(0,0); }
  }
  @keyframes ticker {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes blink { 50% { opacity: 0; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes orb-rotate { to { transform: rotate(360deg); } }
  @keyframes orb-rotate-rev { to { transform: rotate(-360deg); } }
  @keyframes orb-glow {
    0%, 100% { box-shadow: 0 24px 60px rgba(17,17,17,0.35), 0 0 0 0 rgba(17,17,17,0.0), inset 0 1px 1px rgba(255,255,255,0.25); }
    50%      { box-shadow: 0 24px 60px rgba(17,17,17,0.45), 0 0 46px 6px rgba(17,17,17,0.18), inset 0 1px 1px rgba(255,255,255,0.25); }
  }
  @keyframes confetti-fall { to { transform: translateY(110vh) rotate(720deg); } }

  .fade-up { animation: fadeUp 0.7s cubic-bezier(.2,.8,.2,1) both; animation-fill-mode: forwards; opacity: 1; }

  /* Mono number */
  .tabular { font-variant-numeric: tabular-nums; }

  /* Page base */
  .page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Global nav */
  .nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 18px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 50;
    background: var(--bg);
    border-bottom: 1px solid var(--line);
    pointer-events: auto;
  }
  .nav-brand { display: flex; align-items: center; gap: 10px; color: var(--fg); cursor: pointer; }
  .nav-links {
    display: flex; gap: 32px;
    color: var(--fg-2);
    font-size: calc(12px * var(--scale));
  }
  .nav-links button { transition: color 120ms; cursor: pointer; }
  .nav-links button:hover { color: var(--fg); }
  .nav-links button.active { color: var(--fg); }
  .nav-links button.active::before { content: '→ '; color: var(--accent); }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed;
    bottom: 20px; right: 20px;
    width: 280px;
    background: var(--bg);
    border: 1px solid var(--line);
    z-index: 100;
    font-size: calc(11px * var(--scale));
    transform: translateY(calc(100% + 40px));
    transition: transform 240ms cubic-bezier(.2,.8,.2,1);
  }
  .tweaks-panel.open { transform: translateY(0); }
  .tweaks-head {
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: center;
  }
  .tweaks-head span { text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-2); font-size: calc(10px * var(--scale)); }
  .tweaks-body { padding: 16px; display: flex; flex-direction: column; gap: 18px; }
  .tweaks-row { display: flex; flex-direction: column; gap: 6px; }
  .tweaks-row > label {
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-size: calc(9px * var(--scale));
    color: var(--fg-3);
  }
  .tweaks-opts { display: flex; gap: 6px; flex-wrap: wrap; }
  .tweaks-opts button {
    padding: 6px 10px;
    border: 1px solid var(--line);
    color: var(--fg-2);
    font-size: calc(10px * var(--scale));
    transition: all 120ms;
  }
  .tweaks-opts button:hover { color: var(--fg); border-color: var(--fg-3); }
  .tweaks-opts button.active { background: var(--fg); color: var(--bg); border-color: var(--fg); }
  .swatch {
    width: 18px; height: 18px;
    border: 1px solid var(--line);
    cursor: pointer;
  }
  .swatch.active { outline: 1px solid var(--fg); outline-offset: 2px; }

  /* Config back-overlay only exists on mobile (shown in media block) */
  .pv-back-overlay { display: none; }

  /* Floating controls on the product preview (all viewports) */
  .pv-reset, .pv-zoom {
    position: absolute;
    z-index: 42;
    display: flex; align-items: center; justify-content: center;
    width: 38px; height: 38px;
    background: color-mix(in srgb, var(--bg) 72%, transparent);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    border: 1px solid var(--line);
    color: var(--fg);
    cursor: pointer;
  }
  .pv-reset { top: 10px; right: 12px; }
  .pv-zoom  { bottom: 12px; right: 12px; }
  .pv-reset:hover, .pv-zoom:hover { color: var(--accent); border-color: var(--accent); }

  /* ───────────────────────────────────────────────────────────────
     MOBILE  < 768px
     Strategy: global scale-down + hamburger nav + stack grids +
     bottom-sheet tweaks. Touch targets kept ≥ 44px.
     ─────────────────────────────────────────────────────────────── */
  @media (max-width: 768px) {
    :root {
      /* global font + spacing scale reduction — proportional,
         headline hierarchy preserved. Overrides user setting on small screens. */
      --scale: 0.78;
    }
    body { font-size: calc(14px * var(--scale)); }

    /* Nav: hamburger pattern. Show burger, hide link row until .open */
    .nav {
      padding: 14px 20px;
    }
    .nav-links {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: var(--bg);
      flex-direction: column;
      gap: 0;
      padding: 72px 24px 40px;
      transform: translateY(-100%);
      transition: transform 280ms cubic-bezier(.2,.8,.2,1);
      border-bottom: 1px solid var(--line);
      z-index: 49;
    }
    .nav-links.open { transform: translateY(0); }
    .nav-links button {
      text-align: left;
      padding: 18px 0;
      min-height: 44px;
      font-size: 15px;
      border-bottom: 1px solid var(--line);
      width: 100%;
    }
    .nav-links button:last-child { border-bottom: none; }

    .nav-burger {
      display: flex !important;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 44px; height: 44px;
      gap: 5px;
      position: relative;
      z-index: 51;
    }
    .nav-burger span {
      display: block;
      width: 22px; height: 1.5px;
      background: var(--fg);
      transition: transform 200ms, opacity 200ms;
    }
    .nav-burger.open span:nth-child(1) { transform: translateY(3.25px) rotate(45deg); }
    .nav-burger.open span:nth-child(2) { opacity: 0; }
    .nav-burger.open span:nth-child(3) { transform: translateY(-3.25px) rotate(-45deg); }

    /* Tweaks becomes bottom-sheet */
    .tweaks-panel {
      bottom: 0 !important;
      right: 0 !important;
      left: 0 !important;
      width: auto !important;
      max-height: 85vh;
      transform: translateY(100%);
      border-left: none;
      border-right: none;
      border-bottom: none;
      border-top: 1px solid var(--line);
    }
    .tweaks-panel.open { transform: translateY(0); }
    .tweaks-head { padding: 14px 20px; }
    .tweaks-body { padding: 14px 20px; max-height: calc(85vh - 52px) !important; }

    /* Generic: stack any 2+ col CSS-grid inside inline styles
       (covered by utility class below) */
    .m-stack { grid-template-columns: 1fr !important; }
    .m-stack-2 { grid-template-columns: repeat(2, 1fr) !important; }
    .m-hide { display: none !important; }
    .m-block { display: block !important; }
    .m-pad-x { padding-left: 20px !important; padding-right: 20px !important; }

    /* Global: every fixed header area — pull padding in */
    .page-pad {
      padding: 88px 22px 56px !important;
    }

    /* More breathing room between sections on mobile */
    .page-pad > * + * { margin-top: 0; }
    .page-pad section + section,
    .page-pad > div + div { margin-top: 8px; }

    /* Larger tap targets on any small button */
    button { min-height: auto; }

    /* Prevent headlines from shrinking below readable on very narrow */
    h1 { font-size: clamp(38px, 11vw, 72px) !important; line-height: 1.02 !important; }
    h2 { font-size: clamp(26px, 6.5vw, 40px) !important; line-height: 1.1 !important; }
    h3 { font-size: clamp(22px, 5.5vw, 32px) !important; line-height: 1.15 !important; }
  /* Configurator: the product preview stays PINNED at the top while the
     options scroll underneath (Porsche-configurator pattern). Full-width
     preview, and the step bar pins right below it. */
  .config-page { padding-top: calc(44vh + 134px) !important; }
  /* on mobile the reset button sits below the nav overlap, like back */
  .pv-reset { top: 34px; }
  .mobile-preview-first { order: -1 !important; margin: 0 !important; height: 0; overflow: visible; }
  .mobile-preview-first .m-preview-sticky {
    position: fixed !important;
    top: 48px !important;
    left: 0 !important;
    right: 0 !important;
    height: 44vh !important;
    z-index: 40;
  }
  .m-preview-sticky .pv3d {
    aspect-ratio: auto !important;
    height: 100% !important;
    border-left: none !important;
    border-right: none !important;
    box-shadow: 0 14px 34px rgba(22, 20, 15, 0.16);
  }
  .mobile-stepper {
    position: fixed !important;
    top: calc(48px + 44vh) !important;
    left: 0 !important;
    right: 0 !important;
    z-index: 39;
    background: var(--bg);
    margin: 0 !important;
    border-bottom: 1px solid var(--line);
  }
  /* back button floats small on top of the pinned preview (below the
     fixed nav, which overlaps the preview's top edge) */
  .pv-back-overlay {
    display: block !important;
    position: absolute;
    top: 34px; left: 12px;
    z-index: 42;
    padding: 4px 8px;
    background: color-mix(in srgb, var(--bg) 70%, transparent);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
  }
  .config-back-header { display: none !important; }

  /* Configurator: more breathing room between stepper and content */
  .mobile-stepper { margin-bottom: 28px !important; }
  .m-stack { gap: 32px !important; }

  /* Inspire: feed layout on mobile — big cards, 1 per row */
  .inspire-grid { grid-template-columns: 1fr !important; gap: 20px !important; }
  .inspire-card { padding: 18px !important; gap: 18px !important; }
  .inspire-title { font-size: calc(19px * var(--scale)) !important; }
  .inspire-remix { min-height: 44px; padding: 10px 14px !important; }

  /* Briefs: stacked on mobile — kw hidden, title+bounty block, arrow right */
  .brief-row {
    grid-template-columns: 1fr auto !important;
    grid-template-rows: auto auto !important;
    gap: 8px 14px !important;
    padding: 22px 14px !important;
    align-items: start !important;
  }
  .brief-row .brief-kw { display: none !important; }
  .brief-row .brief-title {
    grid-column: 1 / 2 !important;
    grid-row: 1 / 2 !important;
    font-size: calc(14px * var(--scale)) !important;
    line-height: 1.4 !important;
  }
  .brief-row .brief-bounty {
    grid-column: 1 / 2 !important;
    grid-row: 2 / 3 !important;
    font-size: calc(11px * var(--scale)) !important;
    color: var(--fg-3) !important;
  }
  .brief-row svg { grid-column: 2 / 3; grid-row: 1 / 3; align-self: center; }

  /* Collab: swap desktop rows for mobile cards */
  .mobile-hide-inline { display: none !important; }
  .desktop-hide-inline { display: block !important; }
  .collab-card-mobile { padding: 22px !important; margin-bottom: 16px !important; }
  .collab-pairing { grid-template-columns: 1fr !important; gap: 20px !important; margin-top: 40px !important; }

  /* Launch overlay: stack hero on mobile, product on top */
  .launch-hero { grid-template-columns: 1fr !important; gap: 24px !important; overflow-y: auto !important; }
  .launch-product { order: -1 !important; height: 46vh !important; min-height: 300px !important; }
  .launch-product > div { max-width: none !important; margin: 0 !important; height: 100% !important; }
  .launch-stats { gap: 12px !important; }
  }

  /* Default (desktop): show desktop rows, hide mobile cards */
  .mobile-hide-inline { display: block; }
  .desktop-hide-inline { display: none; }

  /* Hide burger on desktop */
  .nav-burger { display: none; }
</style>
</head>
